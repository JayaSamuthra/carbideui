<li class="cds--header__submenu" role="none">
  <!-- Trigger button -->
  <a
    #menuTrigger
    class="cds--header__menu-item cds--header__menu-title"
    tabindex="0"
    aria-haspopup="menu"
    [attr.aria-expanded]="expanded()"
    (click)="onTriggerClick()"
    (mouseenter)="onTriggerMouseEnter()"
    (mouseleave)="onTriggerMouseLeave()"
    (keydown)="onTriggerKeydown($event)"
  >
    {{ title() }}
    <ngcc-icon
      name="chevron_down"
      [decorative]="true"
      size="sm"
      svgClass="cds--header__menu-arrow"
    />
  </a>

  <!-- Dropdown list
       Carbon CSS shows this via:
       .cds--header__menu-title[aria-expanded="true"] + .cds--header__menu { display: block }
  -->
  <ul
    #menuList
    class="cds--header__menu"
    role="menu"
    tabindex="0"
    [attr.aria-label]="title()"
    (keydown)="onMenuKeydown($event)"
    (focusout)="onMenuFocusOut($event)"
    (mouseenter)="onMenuMouseEnter()"
    (mouseleave)="onMenuMouseLeave()"
  >
    <ng-content />
  </ul>
</li>
