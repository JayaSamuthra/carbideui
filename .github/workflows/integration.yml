name: Integration Tests

on:
  push:
    branches: [main, development]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main, development]
  merge_group:
    types: [checks_requested]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    name: Integration — Angular ${{ matrix.angular-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        angular-version: ['20', '21']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Build library
        run: npm run build:lib

      - name: Install integration dependencies (Angular ${{ matrix.angular-version }})
        working-directory: integration/angular-${{ matrix.angular-version }}
        run: npm install

      - name: Build integration app (Angular ${{ matrix.angular-version }})
        working-directory: integration/angular-${{ matrix.angular-version }}
        run: npm run build

      - name: Job Summary
        if: always()
        run: |
          echo "## Integration Results — Angular ${{ matrix.angular-version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Library build | ${{ steps.build.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Angular ${{ matrix.angular-version }} install | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Angular ${{ matrix.angular-version }} build | ${{ job.status == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
